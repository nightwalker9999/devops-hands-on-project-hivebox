# CI Workflow

name: CI

on: 
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs: 
  lint_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Set up Python
        uses: actions/setup-python@v5
        
