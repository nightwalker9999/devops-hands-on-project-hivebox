# CI Workflow

name: CI

on: 
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs: 
  lint_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config=p/python --error app/

      - name: Run Trivy (Dockerfile scan)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: 0
          severity: HIGH,CRITICAL

  deploy:
    needs: lint_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create KIND cluster
        uses: helm/kind-action@v1.14.0
        with:
          config: k8s/kind-config.yaml
          cluster_name: kind

      - name: Install Ingress-Nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=90s

      - name: Build image into KIND
        run: |
          docker build -t hivebox:local .
          kind load docker-image hivebox:local

      - name: Update image in deployment
        run: |
          sed -i 's|ghcr.io/nightwalker9999/hivebox:latest|hivebox:local|' k8s/deployment.yaml

      - name: Deploy to KIND
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl wait --for=condition=available deployment/hivebox --timeout=60s

      - name: Verify /version endpoint
        run: |
          kubectl port-forward svc/hivebox 5000:80 &
          sleep 3
          curl -f http://localhost:5000/version